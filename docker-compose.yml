services:
  database:
    container_name: postgres_db
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DBNAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - url_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DBNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: "./backend"
    container_name: croplink_backend
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DBNAME: ${DB_DBNAME}
      DB_SSLMODE: ${DB_SSLMODE}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      JWT_SECRETKEY: ${JWT_SECRETKEY}
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - url_network
  
  frontend:
    build:
      context: "./frontend"
      args:
        VITE_BACKEND_BASE_URL: ${BACKEND_BASE_URL}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: croplink-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - url_network

volumes:
  pgdata:

networks:
  url_network: